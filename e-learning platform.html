<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Learning Platform</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f6f9;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background-color: #34495e;
    }

    nav button {
      background: none;
      color: white;
      border: none;
      padding: 15px 20px;
      cursor: pointer;
      font-size: 16px;
    }

    nav button:hover, nav button.active {
      background-color: #2c3e50;
    }

    .container {
      padding: 20px;
    }

    .course {
      background-color: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .course h3 {
      margin: 0 0 10px;
    }

    .progress-bar {
      height: 10px;
      background-color: #ccc;
      border-radius: 5px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-bar-inner {
      height: 10px;
      background-color: #27ae60;
      width: 0%;
      transition: width 0.3s;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 8px;
      margin-top: 20px;
    }

    .hidden {
      display: none;
    }

    button.track-btn {
      margin-top: 10px;
      padding: 8px 12px;
      background-color: #2980b9;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button.track-btn:hover {
      background-color: #3498db;
    }
  </style>
</head>
<body>

  <header>
    <h1>My E-Learning Platform</h1>
  </header>

  <nav>
    <button class="nav-btn active" onclick="showPage('courses')">Courses</button>
    <button class="nav-btn" onclick="showPage('progress')">Progress</button>
    <button class="nav-btn" onclick="showPage('video')">Video Lesson</button>
  </nav>

  <div class="container">
    <!-- Courses Page -->
    <div id="coursesPage">
      <h2>Available Courses</h2>
      <div class="course">
        <h3>JavaScript Basics</h3>
        <p>Learn the fundamentals of JavaScript including variables, functions, and events.</p>
        <button class="track-btn" onclick="updateProgress('JavaScript Basics', 25)">Mark 25% Complete</button>
      </div>
      <div class="course">
        <h3>HTML & CSS</h3>
        <p>Build beautiful, responsive websites using HTML and CSS.</p>
        <button class="track-btn" onclick="updateProgress('HTML & CSS', 50)">Mark 50% Complete</button>
      </div>
    </div>

    <!-- Progress Page -->
    <div id="progressPage" class="hidden">
      <h2>Your Progress</h2>
      <div id="progressContainer"></div>
    </div>

    <!-- Video Page -->
    <div id="videoPage" class="hidden">
      <h2>Sample Lesson: HTML Basics</h2>
      <iframe src="https://www.youtube.com/embed/pQN-pnXPaVg" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    const navButtons = document.querySelectorAll(".nav-btn");
    const pages = {
      courses: document.getElementById("coursesPage"),
      progress: document.getElementById("progressPage"),
      video: document.getElementById("videoPage")
    };

    function showPage(page) {
      for (let key in pages) {
        pages[key].classList.add("hidden");
      }
      pages[page].classList.remove("hidden");

      navButtons.forEach(btn => btn.classList.remove("active"));
      document.querySelector(`.nav-btn[onclick="showPage('${page}')"]`).classList.add("active");

      if (page === "progress") renderProgress();
    }

    function updateProgress(courseName, percent) {
      let progress = JSON.parse(localStorage.getItem("progress") || "{}");
      progress[courseName] = Math.max(progress[courseName] || 0, percent);
      localStorage.setItem("progress", JSON.stringify(progress));
      alert(`Progress for "${courseName}" updated to ${percent}%`);
    }

    function renderProgress() {
      const container = document.getElementById("progressContainer");
      const progress = JSON.parse(localStorage.getItem("progress") || "{}");

      container.innerHTML = Object.keys(progress).length === 0 
        ? "<p>No progress yet. Take some courses!</p>"
        : "";

      for (let course in progress) {
        container.innerHTML += `
          <div class="course">
            <h3>${course}</h3>
            <div class="progress-bar">
              <div class="progress-bar-inner" style="width: ${progress[course]}%;"></div>
            </div>
            <p>${progress[course]}% Complete</p>
          </div>
        `;
      }
    }

    // Default load
    showPage("courses");
  </script>
</body>
</html>
